{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="fw-bold mb-4">Mis Citas Agendadas</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <ul class="list-group shadow-sm">
                {% for cita in citas %}
                <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                    <div>
                        <h5 class="mb-1 fw-bold">{{ cita.servicio }}</h5>
                        <small class="text-muted"><i class="bi bi-clock"></i> {{ cita.fecha }} a las {{ cita.hora }}</small>
                    </div>
                    <span class="badge bg-primary rounded-pill">Confirmada</span>
                </li>
                {% empty %}
                <li class="list-group-item text-muted p-5">No tienes citas próximas.</li>
                {% endfor %}
            </ul>
            <a href="{% url 'agendar' %}" class="btn btn-outline-primary mt-4">Agendar otra cita</a>
        </div>
    </div>
</div>
{% endblock %}
