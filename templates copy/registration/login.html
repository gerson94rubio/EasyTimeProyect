{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4 bg-body-tertiary">
            <div class="card-body p-5 text-center">
                <i class="bi bi-person-circle display-1 text-primary mb-4"></i>
                <h2 class="fw-bold mb-4 custom-text-bright">Iniciar Sesión</h2>
                
                <div id="simulacion-error" class="alert alert-warning small mb-3 shadow-sm" style="display: none; border-radius: 12px;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Por favor, ingresa tu usuario.
                </div>
                <div id="simulacion-alerta" class="alert alert-info small mb-3 shadow-sm" style="display: none; border-radius: 12px;">
                    <i class="bi bi-send-check-fill me-2"></i> Enlace enviado a: <strong id="user-display"></strong>
                </div>

                <form method="post" class="text-start" id="loginForm">
                    {% csrf_token %}
                    
                    {# Renderizado manual para asegurar IDs y Clases compatibles con tu estilo #}
                    <div class="mb-3">
                        <label class="form-label fw-bold small custom-text-bright">Usuario o Correo</label>
                        <input type="text" name="username" id="id_login_user" 
                               class="form-control custom-input" 
                               placeholder="Ingresa tu usuario" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small custom-text-bright">Contraseña</label>
                        <input type="password" name="password" id="id_password" 
                               class="form-control custom-input" 
                               placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small custom-text-dim" for="rememberMe">Recordarme</label>
                        </div>
                        {# Botón de simulación con ID único #}
                        <button type="button" id="btn-recuperar-pass" class="btn btn-link small p-0 text-decoration-none fw-bold text-primary border-0 bg-transparent">
                            ¿Olvidaste tu clave?
                        </button>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow-sm">
                        Entrar
                    </button>
                </form>
                
                <hr class="my-4">
                <p class="small custom-text-dim">¿No tienes cuenta? <a href="{% url 'registro' %}" class="fw-bold">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica de simulación infalible
    document.getElementById('btn-recuperar-pass').onclick = function() {
        const inputUser = document.getElementById('id_login_user');
        const alertaOk = document.getElementById('simulacion-alerta');
        const alertaNo = document.getElementById('simulacion-error');
        const txtUser = document.getElementById('user-display');

        // Limpiar estados
        alertaOk.style.display = 'none';
        alertaNo.style.display = 'none';

        if (inputUser.value.trim() !== "") {
            txtUser.innerText = inputUser.value;
            alertaOk.style.display = 'block';
        } else {
            alertaNo.style.display = 'block';
            inputUser.focus();
        }
    };
</script>

<style>
    /* Estilos unificados con EasyTime */
    [data-bs-theme="dark"] .custom-text-bright { color: #E2E8F0; }
    [data-bs-theme="dark"] .custom-text-dim { color: #94A3B8; }
    [data-bs-theme="light"] .custom-text-bright { color: #212529; }
    [data-bs-theme="light"] .custom-text-dim { color: #6c757d; }

    .custom-input { 
        width: 100%; 
        padding: 12px 15px; 
        border-radius: 12px; 
        border: 1px solid #ced4da;
        background-color: var(--bs-body-bg); 
        color: var(--bs-body-color);
        display: block;
    }

    .custom-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        outline: none;
    }
</style>
{% endblock %}
