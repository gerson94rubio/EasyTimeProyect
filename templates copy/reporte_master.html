{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/reportes.css' %}">
    <title>{% block titulo %}Reporte EasyTime{% endblock %}</title>
</head>
<body>
    <div class="no-print" style="text-align: center; background: #e9ecef; padding: 10px;">
        <button class="btn-print" onclick="window.print()">
            📄 GENERAR PDF / IMPRIMIR
        </button>
        <p><small>(Este panel no saldrá en el reporte impreso)</small></p>
    </div>

    <header>
        <img src="{% static 'img/logo.png' %}" width="120" alt="Logo EasyTime">
        <h1>EasyTime - Sistema de Autolavado</h1>
        <hr>
    </header>

    <main>
        {% block contenido %}
        {% endblock %}
    </main>
</body>
</html>
