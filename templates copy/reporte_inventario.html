{% extends "reporte_master.html" %}

{% block titulo %}Reporte de Stock EasyTime{% endblock %}

{% block contenido %}
    <h2>Estado Actual del Inventario</h2>
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <thead style="background-color: #28a745; color: white;">
            <tr>
                <th>Producto</th>
                <th>Stock Actual</th>
                <th>Precio Venta</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.nombre }}</td>
                <td>{{ p.stock_actual }}</td>
                <td>${{ p.precio_venta }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
